<button class="fab" onclick="openAddExpense()" id="fab"></button>

<!-- MODAL: ADD/EDIT INCOME -->
<div class="overlay" id="modal-income">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-income')">✕</button>
    <h2 id="income-modal-title">Добавить доход</h2>
    <div class="fgrp">
      <label class="flbl">Источник</label>
      <input type="text" id="inc-source" placeholder="Зарплата, Аванс, Кешбек…"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Сумма, ₽</label>
      <input type="number" id="inc-amount" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Дата</label>
      <input type="date" id="inc-date"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Комментарий</label>
      <input type="text" id="inc-comment" placeholder="Необязательно"/>
    </div>
    <div class="btn-row">
      <button class="btn danger small" id="inc-delete-btn" onclick="deleteIncome()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('modal-income')">Отмена</button>
      <button class="btn primary" onclick="saveIncome()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD/EDIT EXPENSE -->
<div class="overlay" id="modal-expense">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-expense')">✕</button>
    <h2 id="expense-modal-title">Добавить расход</h2>
    <div class="fgrp">
      <label class="flbl">Категория</label>
      <select id="exp-cat"></select>
    </div>
    <div class="fgrp">
      <label class="flbl">Сумма, ₽</label>
      <input type="number" id="exp-amount" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Дата</label>
      <input type="date" id="exp-date"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Комментарий</label>
      <input type="text" id="exp-comment" placeholder="Необязательно"/>
    </div>
    <div class="btn-row">
      <button class="btn danger small" id="exp-delete-btn" onclick="deleteExpense()" style="display:none">Удалить</button>
      <button class="btn" onclick="closeModal('modal-expense')">Отмена</button>
      <button class="btn primary" onclick="saveExpense()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: CATEGORY EXPENSES LIST -->
<div class="overlay" id="modal-cat-expenses">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-cat-expenses')">✕</button>
    <h2 id="cat-exp-title">Расходы</h2>
    <div id="cat-exp-list"></div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn primary" onclick="openAddFromCatModal()">+ Добавить расход</button>
    </div>
  </div>
</div>

<!-- MODAL: LIMIT EDITOR -->
<div class="overlay" id="modal-limits">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-limits')">✕</button>
    <h2>Лимиты</h2>
    <div class="fgrp">
      <label class="flbl">Месяц</label>
      <select id="limit-month-sel" onchange="loadLimitEditor()"></select>
    </div>
    <div id="limit-editor-rows"></div>
    <div class="btn-row" style="margin-top:12px">
      <button class="btn" onclick="closeModal('modal-limits')">Отмена</button>
      <button class="btn primary" onclick="saveLimits()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: ADD ASSET -->
<div class="overlay" id="modal-asset">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-asset')">✕</button>
    <h2>Запись активов</h2>
    <div class="fgrp">
      <label class="flbl">Банк / счёт</label>
      <select id="asset-bank"></select>
    </div>
    <div class="fgrp">
      <label class="flbl">Сумма, ₽</label>
      <input type="number" id="asset-amount" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="fgrp">
      <label class="flbl">Дата (рекомендуется 1 или 16)</label>
      <input type="date" id="asset-date"/>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modal-asset')">Отмена</button>
      <button class="btn primary" onclick="saveAsset()">Сохранить</button>
    </div>
  </div>
</div>

<!-- MODAL: BANK MANAGER -->
<div class="overlay" id="modal-banks">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-banks')">✕</button>
    <h2>Банки</h2>
    <div id="bank-manager-list"></div>
    <div class="fgrp" style="margin-top:12px">
      <label class="flbl">Добавить счёт</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="new-bank-name" placeholder="Название банка"/>
        <button class="btn primary small" onclick="addBank()">Добавить</button>
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:var(--muted);cursor:pointer">
        <input type="checkbox" id="new-bank-credit" style="width:16px;height:16px;padding:0;margin:0"/>
        Кредитный (вычитать из общей суммы)
      </label>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn primary" onclick="closeModal('modal-banks')">Готово</button>
    </div>
  </div>
</div>

<!-- MODAL: CAT MANAGER -->
<div class="overlay" id="modal-cats">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-cats')">✕</button>
    <h2>Категории расходов</h2>
    <div id="cat-manager-list"></div>
    <div class="fgrp" style="margin-top:12px">
      <label class="flbl">Добавить категорию</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="new-cat-name" placeholder="Название категории"/>
        <button class="btn primary small" onclick="addCategory()">Добавить</button>
      </div>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn primary" onclick="closeModal('modal-cats')">Готово</button>
    </div>
  </div>
</div>

<!-- MODAL: SCRIPT VIEWER -->
<div class="overlay" id="modal-script">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-script')">✕</button>
    <h2>Apps Script</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">Нажмите «Скопировать» или выделите весь текст вручную (Ctrl+A / Cmd+A)</p>
    <textarea id="script-code-ta" readonly style="width:100%;height:200px;font-family:monospace;font-size:11px;resize:none;padding:10px;border-radius:var(--r-sm);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);line-height:1.5"></textarea>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn" onclick="closeModal('modal-script')">Закрыть</button>
      <button class="btn primary" onclick="copyScriptFromModal()">📋 Скопировать</button>
    </div>
  </div>
</div>

<!-- MODAL: SYNC SETTINGS -->
<div class="overlay" id="modal-sync">
  <div class="sheet" style="position:relative">
    <button class="close-btn" onclick="closeModal('modal-sync')">✕</button>
    <h2>Google Sheets</h2>
    <div class="fgrp">
      <label class="flbl">URL веб-приложения Apps Script</label>
      <input type="url" id="sync-url-input" placeholder="https://script.google.com/..."/>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="closeModal('modal-sync')">Отмена</button>
      <button class="btn primary" onclick="saveSyncUrl()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
